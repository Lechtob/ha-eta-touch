name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install checks
        run: python -m pip install ruff pytest
      - name: Lint
        run: ruff check .
      - name: Compile
        run: python -m compileall custom_components tests
      - name: Unit tests
        run: pytest

